<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Recover Account</title>
    <link rel="stylesheet" href="app.css">
</head>
<body class="auth-page">
    <div class="auth-split">
        <div class="auth-panel-left">
            <div class="auth-brand">
                <div class="auth-mark">ET</div>
                <div>
                    <div class="auth-brand-name">EduTrack</div>
                    <div class="auth-brand-sub">Course &amp; Progress System</div>
                </div>
            </div>
            <div class="auth-panel-mid">
                <div class="auth-eyebrow">Recovery</div>
                <h1>Let's get you back in.</h1>
                <p>Enter the email address associated with your account, and we'll send you instructions to reset your password.</p>
            </div>
        </div>

        <div class="auth-panel-right">
            <div class="auth-form-wrap">
                <a href="login-selection.html" class="auth-back">&larr; Back to login</a>
                <h2>Reset password</h2>
                <form action="reset-password.html" method="GET">
                    <div class="field">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" placeholder="you@university.edu" required>
                    </div>
                    <button type="submit" class="btn-auth">Send Reset Link</button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
