<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Create New Password</title>
    <link rel="stylesheet" href="app.css">
</head>
<body class="auth-page">
    <div class="auth-split">
        <div class="auth-panel-left">
            <div class="auth-brand">
                <div class="auth-mark">ET</div>
                <div>
                    <div class="auth-brand-name">EduTrack</div>
                    <div class="auth-brand-sub">Course &amp; Progress System</div>
                </div>
            </div>
            <div class="auth-panel-mid">
                <div class="auth-eyebrow">Security</div>
                <h1>Set a new password</h1>
                <p>Ensure your new password is secure and unique to protect your account information.</p>
            </div>
        </div>

        <div class="auth-panel-right">
            <div class="auth-form-wrap">
                <h2>New Password</h2>
                <form action="student-login.html" method="POST">
                    <div class="field">
                        <label for="password">New Password</label>
                        <input type="password" id="password" name="password" placeholder="Create a new password" required>
                    </div>
                    <div class="field">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm_password" placeholder="Repeat new password" required>
                    </div>
                    <button type="submit" class="btn-auth">Update Password</button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
