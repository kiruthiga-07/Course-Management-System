<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment | EduTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.css">
</head>
<body class="auth-page">

    <a href="courses.html" class="back-nav">&larr; Back</a>

    <div class="auth-card">

        <!-- ===================== ENROLLMENT FORM ===================== -->
        <div class="form-view" id="formView">
            <svg class="auth-icon" viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm0 2.18l7 3.82-7 3.82-7-3.82 7-3.82zM12 18.82l-5-2.73v-4.36L12 14.5l5-2.73v4.36l-5 2.73z"/></svg>
            <h1>Student Enrollment</h1>
            <span class="enroll-course-tag" id="courseTag" style="display:none;"></span>
            <p id="formSubtitle">Enter your details below to enroll.</p>

            <form id="enrollForm">
                <div class="form-group">
                    <label for="studentName">Student Name</label>
                    <input type="text" id="studentName" name="studentName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="rollNo">Roll No</label>
                    <input type="text" id="rollNo" name="rollNo" placeholder="Enter your roll number" required>
                </div>
                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>

        <!-- ===================== SUCCESS MESSAGE ===================== -->
        <div class="success-view" id="successView">
            <svg class="success-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            <h1>Successfully Submitted!</h1>
            <p id="successMessage">Your enrollment details have been recorded.</p>
            <div class="success-actions">
                <a href="#" id="startLearningLink" class="btn-dashboard-link" style="display:none;">Start Learning</a>
                <a href="student-dashboard.html" class="btn-dashboard-link btn-outline-link">View Dashboard</a>
            </div>
        </div>

    </div>


    <script src="app.js"></script>
</body>
</html>
